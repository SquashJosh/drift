<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drift</title>
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; }
    #map { width: 100%; height: 100%; background: #0a0d0c; }

    :root {
      --panel: rgba(10, 12, 11, 0.62);
      --hair: rgba(255, 255, 255, 0.10);
      --ink: #f3f1ea;
      --ink-dim: rgba(243, 241, 234, 0.55);
      --ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    #topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      height: 48px;
      background: var(--panel);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--hair);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    #topbar h1 {
      color: var(--ink); font-family: var(--ui);
      font-size: 18px; font-weight: 500;
      letter-spacing: 0.30em; text-transform: uppercase;
    }
    #readout {
      font-family: var(--ui); font-variant-numeric: tabular-nums;
      font-size: 13px; letter-spacing: 0.04em; color: var(--ink-dim);
    }
    #readout b { color: var(--ink); font-weight: 600; }

    #legend {
      position: absolute; left: 20px; bottom: 24px; z-index: 10;
      background: var(--panel);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--hair); border-radius: 4px;
      padding: 12px 14px; font-family: var(--ui); color: var(--ink);
      display: flex; gap: 12px; align-items: stretch;
    }
    #legend .title {
      writing-mode: vertical-rl; transform: rotate(180deg);
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-dim); align-self: center;
    }
    #legend .bar {
      width: 12px; height: 140px; border-radius: 2px;
      box-shadow: inset 0 0 0 1px var(--hair);
    }
    #legend .ticks {
      display: flex; flex-direction: column; justify-content: space-between;
      font-size: 11px; font-variant-numeric: tabular-nums; color: var(--ink-dim);
    }

    .maplibregl-ctrl-top-right { margin-top: 56px; }
    .maplibregl-ctrl-attrib { background: var(--panel) !important; backdrop-filter: blur(8px); }
    .maplibregl-ctrl-attrib a { color: var(--ink-dim) !important; }
  </style>
</head>
<body>
  <div id="topbar">
    <h1>Drift</h1>
    <div id="readout">Ottawa &nbsp;·&nbsp; <b id="elev">&mdash;</b></div>
  </div>
  <div id="map"></div>

  <div id="legend">
    <div class="title">Elevation</div>
    <div class="bar" id="legendBar"></div>
    <div class="ticks" id="legendTicks"></div>
  </div>

  <script>
    // Green -> yellow -> orange -> red elevation ramp. Map paint uses these
    // baked to ~0.55 alpha so the basemap shows through; legend uses full
    // opacity for readability against the dark panel.
    const RAMP_RGB = [
      '34, 139, 34',   // forest green (low)
      '154, 205, 50',  // yellow-green
      '255, 215, 0',   // gold
      '255, 140, 0',   // dark orange
      '220, 20, 60',   // crimson (high)
    ];

    const DEM_SOURCE = {
      type: 'raster-dem',
      tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
      encoding: 'terrarium',
      tileSize: 256,
      maxzoom: 15,
      attribution: "Elevation: <a href='https://registry.opendata.aws/terrain-tiles/'>AWS Terrain Tiles</a> (Mapzen / 3DEP / others)"
    };

    function buildColorReliefExpr(min, max) {
      let lo = min, hi = max;
      if (hi - lo < 1e-6) hi = lo + 1e-6; // guard against a flat viewport
      const n = RAMP_RGB.length;
      const expr = ['interpolate', ['linear'], ['elevation']];
      for (let i = 0; i < n; i++) {
        const val = lo + (hi - lo) * (i / (n - 1));
        expr.push(val, `rgba(${RAMP_RGB[i]}, 0.55)`);
      }
      return expr;
    }

    let elevationLayerId = 'elevation-tint';
    let beforeLayerId; // first symbol layer in the liberty style, captured at style-load time

    const map = new maplibregl.Map({
      container: 'map',
      style: { version: 8, sources: {}, layers: [] },
      center: [-75.81974, 45.27836],
      zoom: 11,
      pitch: 0,
      maxPitch: 0,
      antialias: true
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    map.setStyle('https://tiles.openfreemap.org/styles/liberty', {
      transformStyle: (previous, next) => {
        next.sources = { ...next.sources, 'terrain-dem': DEM_SOURCE };

        const layers = next.layers.slice();
        let symbolIndex = layers.findIndex(l => l.type === 'symbol');
        if (symbolIndex < 0) symbolIndex = layers.length;
        beforeLayerId = layers[symbolIndex] ? layers[symbolIndex].id : undefined;

        layers.splice(symbolIndex, 0, {
          id: elevationLayerId,
          type: 'color-relief',
          source: 'terrain-dem',
          paint: { 'color-relief-color': buildColorReliefExpr(0, 1000) }
        });
        next.layers = layers;

        next.terrain = { source: 'terrain-dem', exaggeration: 1 };
        return next;
      }
    });

    function updateColorRelief(min, max) {
      const expr = buildColorReliefExpr(min, max);
      try {
        map.setPaintProperty(elevationLayerId, 'color-relief-color', expr);
      } catch (e) {
        if (map.getLayer(elevationLayerId)) map.removeLayer(elevationLayerId);
        map.addLayer({
          id: elevationLayerId,
          type: 'color-relief',
          source: 'terrain-dem',
          paint: { 'color-relief-color': expr }
        }, beforeLayerId);
      }
    }

    function updateLegend(min, max) {
      const N = 6;
      const ticks = [];
      for (let i = 0; i < N; i++) ticks.push(min + (max - min) * (i / (N - 1)));
      document.getElementById('legendTicks').innerHTML = ticks
        .slice().reverse()
        .map(v => `<span>${Math.round(v).toLocaleString()} m</span>`)
        .join('');
    }

    const GRID = 20;
    function sampleAndRecolor() {
      const bounds = map.getBounds();
      const sw = bounds.getSouthWest(), ne = bounds.getNorthEast();
      const samples = [];
      for (let i = 0; i < GRID; i++) {
        const lng = sw.lng + (ne.lng - sw.lng) * (i / (GRID - 1));
        for (let j = 0; j < GRID; j++) {
          const lat = sw.lat + (ne.lat - sw.lat) * (j / (GRID - 1));
          const el = map.queryTerrainElevation([lng, lat], { exaggerated: false });
          if (el != null) samples.push(el);
        }
      }
      if (samples.length < 40) return; // DEM not ready yet; next idle/moveend retries
      const min = Math.min(...samples);
      const max = Math.max(...samples);
      updateColorRelief(min, max);
      updateLegend(min, max);
    }

    let debounceTimer = null;
    function scheduleRecolor() {
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = setTimeout(sampleAndRecolor, 150);
    }
    map.on('moveend', scheduleRecolor);
    map.on('idle', scheduleRecolor);

    (function buildLegendBar() {
      const stops = RAMP_RGB.map((rgb, i) => `rgb(${rgb}) ${(i / (RAMP_RGB.length - 1) * 100).toFixed(1)}%`);
      document.getElementById('legendBar').style.background = `linear-gradient(to top, ${stops.join(', ')})`;
    })();

    let raf = null;
    map.on('mousemove', (e) => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = null;
        const el = map.queryTerrainElevation(e.lngLat, { exaggerated: false });
        document.getElementById('elev').textContent = (el == null) ? '—' : Math.round(el).toLocaleString() + ' m';
      });
    });
    map.on('mouseout', () => { document.getElementById('elev').textContent = '—'; });

    map.on('error', (e) => console.error('MapLibre:', e && e.error ? e.error : e));
  </script>
</body>
</html>
