<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drift</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
    #map { width: 100%; height: 100%; }
    #topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      height: 48px;
      background: rgba(10, 10, 10, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      padding: 0 20px;
    }
    #topbar h1 {
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="topbar"><h1>Drift</h1></div>
  <div id="map"></div>
  <script>
    const TOKEN = 'pk.eyJ1Ijoiam9zaHJlbmF1ZCIsImEiOiJjbXBvdDF3NDQwNDN6MnJwcXkwZnp4MnlmIn0.hD5_oumK4BA1yGEN1Wzusw';
    mapboxgl.accessToken = TOKEN;

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v11',
      center: [-115.5708, 51.1784],
      zoom: 9,
      pitch: 60,
      bearing: -20,
      antialias: true
    });

    map.on('load', () => {
      // TerrainLayer: elevationData drives the 3D mesh shape; texture drapes the color.
      // deck.gl's TerrainLayer getColor/colorRange are per-tile, not per-vertex elevation,
      // so a pre-colored texture is the correct way to achieve an elevation color ramp.
      // outdoors-v12 naturally maps green→brown→white across the elevation range.
      // 2x exaggeration is applied by doubling the elevation decoder scalers and offset.
      map.addLayer(new deck.MapboxLayer({
        id: 'drift-terrain',
        type: deck.TerrainLayer,
        elevationData: `https://api.mapbox.com/v4/mapbox.terrain-rgb/{z}/{x}/{y}.pngraw?access_token=${TOKEN}`,
        texture: `https://api.mapbox.com/styles/v1/mapbox/outdoors-v12/tiles/{z}/{x}/{y}?access_token=${TOKEN}`,
        elevationDecoder: {
          rScaler: 13107.2,
          gScaler: 51.2,
          bScaler: 0.2,
          offset: -20000
        },
        meshMaxError: 4,
        pickable: false
      }));
    });
  </script>
</body>
</html>
