<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drift</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
    #map { width: 100%; height: 100%; }
    #topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      height: 48px;
      background: rgba(10, 10, 10, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      padding: 0 20px;
    }
    #topbar h1 {
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="topbar"><h1>Drift</h1></div>
  <div id="map"></div>
  <script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoiam9zaHJlbmF1ZCIsImEiOiJjbXBvdDF3NDQwNDN6MnJwcXkwZnp4MnlmIn0.hD5_oumK4BA1yGEN1Wzusw';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/light-v11',
      center: [-115.5708, 51.1784],
      zoom: 9,
      pitch: 60,
      bearing: -20,
      antialias: true
    });

    map.on('load', () => {
      map.addSource('dem', {
        type: 'raster-dem',
        url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
        tileSize: 512
      });

      map.setTerrain({ source: 'dem', exaggeration: 6.0 });

      map.addLayer({
        id: 'elevation-color',
        type: 'hillshade',
        source: 'dem',
        paint: {
          'hillshade-shadow-color': '#2a6049',
          'hillshade-highlight-color': '#d4a843',
          'hillshade-accent-color': '#8b4513',
          'hillshade-exaggeration': 0.8
        }
      });

      map.addLayer({
        id: 'hillshade',
        type: 'hillshade',
        source: 'dem',
        paint: {
          'hillshade-exaggeration': 1.0,
          'hillshade-shadow-color': '#1a2744',
          'hillshade-highlight-color': '#ffffff',
          'hillshade-illumination-direction': 335
        }
      });

      map.setFog({
        color: '#d0dde8',
        'horizon-blend': 0.1
      });
    });
  </script>
</body>
</html>
