<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drift</title>
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <h1>Drift</h1>
      <button id="layersBtn" type="button" title="Layers">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="2" y1="5" x2="16" y2="5"/>
          <line x1="2" y1="9" x2="16" y2="9"/>
          <line x1="2" y1="13" x2="16" y2="13"/>
        </svg>
      </button>
      <button id="routeBtn" type="button" title="Build route">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="3" cy="15" r="2"/>
          <circle cx="15" cy="3" r="2"/>
          <path d="M3 13 C3 8 9 10 9 5"/>
          <path d="M9 5 C9 3 11 3 13 3"/>
        </svg>
      </button>
    </div>
    <button id="myRoutesBtn" type="button">My Routes</button>
    <div id="readout"><b id="elev">&mdash;</b></div>
  </div>
  <div id="map"></div>

  <div id="legend">
    <div class="title">Elevation</div>
    <div class="bar" id="legendBar"></div>
    <div class="ticks" id="legendTicks"></div>
  </div>

  <div id="cyclingLegend">
    <div class="title">Cycling</div>
    <div class="cycling-items" id="cyclingLegendItems"></div>
  </div>

  <div id="layersPanel"></div>

  <div id="scrubber">
    <div id="windLoading">Loading wind data&hellip;</div>
    <div class="row top">
      <div class="time" id="scrubberTime">&mdash;</div>
      <div class="wind" id="scrubberWind">&mdash;</div>
      <button type="button" id="scrubberToggle">&times;</button>
    </div>
    <div class="row middle" id="dayChips"></div>
    <div class="row bottom">
      <span class="edge">12 am</span>
      <input type="range" id="hourSlider" min="0" max="23" step="1" value="0" />
      <span class="edge">11 pm</span>
      <button type="button" id="nowBtn">Now</button>
    </div>
  </div>

  <div id="routeControls">
    <button type="button" id="undoBtn" title="Undo last waypoint">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
        <path d="M3 9 L7 5 L7 8 C12 8 15 11 15 15 C13 12 10 11 7 11 L7 13 Z"/>
      </svg>
      Undo
    </button>
    <button type="button" id="clearRouteBtn" title="Clear route">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" width="14" height="14">
        <line x1="4" y1="4" x2="14" y2="14"/><line x1="14" y1="4" x2="4" y2="14"/>
      </svg>
      Clear
    </button>
    <button type="button" id="exportGpxBtn" title="Export GPX" disabled>
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" width="14" height="14">
        <path d="M9 3 L9 12 M5 9 L9 13 L13 9"/><line x1="3" y1="15" x2="15" y2="15"/>
      </svg>
      GPX
    </button>
    <button type="button" id="saveRouteBtn" title="Save route" disabled>
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
        <path d="M3 3 h9 l3 3 v9 a1 1 0 0 1 -1 1 H4 a1 1 0 0 1 -1 -1 Z"/>
        <rect x="6" y="3" width="5" height="4" rx="0.5"/>
        <rect x="5" y="10" width="8" height="5" rx="0.5"/>
      </svg>
      Save
    </button>
  </div>

  <div id="elevationProfile">
    <div id="profileStats"></div>
    <svg id="profileSvg" preserveAspectRatio="none"></svg>
  </div>

  <!-- ROUTE DETAIL VIEW -->
  <div id="routeDetailView">
    <div id="routeDetailHeader">
      <button type="button" id="routeDetailBack">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M11 4 L5 9 L11 14"/>
        </svg>
        My Routes
      </button>
      <div id="routeDetailName" contenteditable="true" spellcheck="false"></div>
      <button type="button" id="routeDetailEdit">Edit on map</button>
    </div>
    <div id="routeDetailBody">
      <div id="routeDetailStats"></div>
      <div id="routeDetailMapContainer">
        <div id="routeDetailMap"></div>
        <div id="routeDetailMapLoading">Loading route…</div>
      </div>
      <div id="routeDetailProfileContainer">
        <div id="routeDetailProfileStats"></div>
        <svg id="routeDetailProfileSvg" preserveAspectRatio="none"></svg>
      </div>
    </div>
  </div>

  <!-- MY ROUTES VIEW -->
  <div id="myRoutesView">
    <div id="myRoutesHeader">
      <button type="button" id="myRoutesBack">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M11 4 L5 9 L11 14"/>
        </svg>
        Map
      </button>
      <span id="myRoutesTitle">My Routes</span>
      <button type="button" id="myRoutesSignOut">Sign out</button>
    </div>
    <div id="myRoutesBody">
      <div id="myRoutesLoading">Loading…</div>
      <div id="myRoutesEmpty" style="display:none">
        <div>No saved routes yet.</div>
        <div>Build a route on the map and hit Save.</div>
      </div>
      <div id="myRoutesSignedOut" style="display:none">
        <div>Sign in to see your saved routes.</div>
        <input type="email" id="myRoutesEmail" placeholder="your@email.com" autocomplete="email" />
        <button type="button" id="myRoutesSendBtn">Send sign-in link</button>
        <div id="myRoutesAuthMsg"></div>
      </div>
      <div id="myRoutesGrid"></div>
    </div>
  </div>

  <div id="authModal">
    <div id="authCard">
      <div id="authTitle">Sign in to save routes</div>
      <div id="authSubtitle">We'll send a link to your email. Click it and you're in — no password needed.</div>
      <input type="email" id="authEmail" placeholder="your@email.com" autocomplete="email" />
      <button type="button" id="authSendBtn">Send link</button>
      <div id="authMessage"></div>
      <button type="button" id="authCloseBtn">Cancel</button>
    </div>
  </div>

  <div id="pointForecast">
    <div id="pfHeader">
      <div id="pfTitleRow">
        <span id="pfName"></span>
        <button type="button" id="pfClose">&times;</button>
      </div>
      <div id="pfConditions"></div>
    </div>
    <div id="pfDays"></div>
    <div id="pfDetail"></div>
  </div>

  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
